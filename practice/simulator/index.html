<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Practice Simulator</title>
<style>
body { background:#111; color:#eee; font-family:Arial; text-align:center; padding:20px; }
button { padding:10px 20px; margin:20px; }
canvas { border:1px solid #333; margin-top:20px; }
#out { display:none; margin-top:20px; }
</style>
</head>

<body>

<h1>Practice Simulator</h1>

<button id="run">Run Simulation</button>

<canvas id="chart" width="900" height="300"></canvas>

<div id="out"></div>

<script>
window.onload = function() {

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

function generateChart() {
  let data = [];
  let value = 10;

  for (let i = 0; i < 80; i++) {
    if (i < 20) value += Math.random()*1.5;
    else if (i === 25) value += 15;
    else if (i > 25 && i < 40) value += (Math.random()*2 - 0.5);
    else if (i === 45) value -= 25;
    else value += (Math.random() - 0.5);

    data.push(value);
  }

  return data;
}

function drawChart(data) {
  ctx.clearRect(0,0,900,300);

  ctx.beginPath();
  ctx.moveTo(0,250 - data[0]*5);

  data.forEach((v,i)=>{
    ctx.lineTo(i*10, 250 - v*5);
  });

  ctx.stroke();
}

function drawLabels() {
  ctx.fillStyle = "red";
  ctx.fillText("Pump", 250, 50);
  ctx.fillText("Trap", 350, 60);
  ctx.fillText("Dump", 450, 100);
}

function runSim() {
  const chart = generateChart();
  drawChart(chart);
  drawLabels();

  let entry = chart[30];
  let exit = chart[79];
  let single = exit - entry;

  let multi =
    (chart[25] - chart[10]) +
    (chart[35] - chart[20]) +
    (chart[40] - chart[30]);

  document.getElementById("out").innerText =
    "Single Wallet: " + single.toFixed(2) +
    " | Multi Wallet: " + multi.toFixed(2);

  document.getElementById("out").style.display = "block";
}

document.getElementById("run").onclick = runSim;

};
</script>

</body>
</html>
